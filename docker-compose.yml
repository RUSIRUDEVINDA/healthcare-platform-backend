# ─────────────────────────────────────────────────────────────
# Local Development Docker Compose
# Run: docker-compose up --build
# Stop: docker-compose down
# Wipe volumes: docker-compose down -v
# ─────────────────────────────────────────────────────────────

services:

  # ────────────────────────────────
  # Infrastructure Services
  # ────────────────────────────────

  auth-db:
    image: postgres:17-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - healthcare-net

  doctor-db:
    image: postgres:17-alpine
    container_name: doctor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: doctor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5439:5432"
    volumes:
      - doctor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - healthcare-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    ports:
      - "5672:5672"     # AMQP protocol — services connect here
      - "15672:15672"   # Management UI — open http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - healthcare-net

  # ────────────────────────────────
  # Application Services
  # ────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"   # Exposed for direct testing with curl/Postman
    env_file:
      - ./services/auth-service/.env
    environment:
      APP_ENV: development
      PORT: "8001"
      # Set AUTH_DATABASE_URL in repo-root .env to use Neon (sslmode=require). Default stays local auth-db.
      DATABASE_URL: "${AUTH_DATABASE_URL:-postgres://postgres:password123@auth-db:5432/auth_db?sslmode=disable}"
      RABBITMQ_URL: "amqp://admin:password123@rabbitmq:5672/"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-characters!!"
      JWT_REFRESH_SECRET: "local-dev-refresh-secret-minimum-32-chars!"
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "7"
    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-net

  patient-db:
    image: postgres:17-alpine
    container_name: patient-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5434:5432"
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patient_db"]
      interval: 10s
    networks:
      - healthcare-net

  patient-service:
    build:
      context: .
      dockerfile: ./services/patient-service/Dockerfile
    container_name: patient-service
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      PORT: "8002"
      DATABASE_URL: "postgres://postgres:password123@patient-db:5432/patient_db?sslmode=disable"
      RABBITMQ_URL: "amqp://admin:password123@rabbitmq:5672/"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-characters!!"
    depends_on:
      patient-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  doctor-service:
    build:
      context: .
      dockerfile: ./services/doctor-service/Dockerfile
    container_name: doctor-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      APP_ENV: development
      PORT: "8003"
      # Set DOCTOR_DATABASE_URL in repo-root .env to use Neon (sslmode=require). Default stays local doctor-db.
      DATABASE_URL: "${DOCTOR_DATABASE_URL:-postgres://postgres:password123@doctor-db:5432/doctor_db?sslmode=disable}"
      RABBITMQ_URL: "amqp://admin:password123@rabbitmq:5672/"
      AUTH_SERVICE_URL: "http://auth-service:8001"
    depends_on:
      doctor-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - healthcare-net

  # Set OPENAI_API_KEY or GEMINI_API_KEY in repo-root .env; use AI_PROVIDER=openai|gemini.
  ai-symptom-service:
    build:
      context: .
      dockerfile: ./services/ai-symptom-service/Dockerfile
    container_name: ai-symptom-service
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      APP_ENV: development
      PORT: "8008"
      AUTH_SERVICE_URL: "http://auth-service:8001"
      AI_PROVIDER: "${AI_PROVIDER:-openai}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "gpt-4o-mini"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
    depends_on:
      auth-service:
        condition: service_started
    networks:
      - healthcare-net

  payment-db:
    image: postgres:17-alpine
    container_name: payment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5437:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 10s
    networks:
      - healthcare-net

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8005:8005"
    environment:
      APP_ENV: development
      PORT: "8005"
      DATABASE_URL: "postgres://postgres:password123@payment-db:5432/payment_db?sslmode=disable"
      RABBITMQ_URL: "amqp://admin:password123@rabbitmq:5672/"
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-net

  # ────────────────────────────────
  # Reverse Proxy
  # ────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - type: bind
        source: ./nginx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      - auth-service
      - patient-service
      - payment-service
      - doctor-service
      - ai-symptom-service
    networks:
      - healthcare-net

# ────────────────────────────────
# Named Volumes (data persists between container restarts)
# ────────────────────────────────
volumes:
  auth-db-data:
  doctor-db-data:
  rabbitmq-data:
  patient-db-data:
  payment-db-data:

# ────────────────────────────────
# Internal network
# Services talk to each other using container names as hostnames
# e.g. auth-service → "auth-db:5432", doctor-service → "doctor-db:5432"
# ────────────────────────────────
networks:
  healthcare-net:
    driver: bridge
