version: '3.8'

# ─────────────────────────────────────────────────────────────
# Local Development Docker Compose
# Run: docker-compose up --build
# Stop: docker-compose down
# Wipe volumes: docker-compose down -v
# ─────────────────────────────────────────────────────────────

services:

  # ────────────────────────────────
  # Infrastructure Services
  # ────────────────────────────────

  auth-db:
    image: postgres:17-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - healthcare-net

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    ports:
      - "5672:5672"     # AMQP protocol — services connect here
      - "15672:15672"   # Management UI — open http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - healthcare-net

  # ────────────────────────────────
  # Application Services
  # ────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"   # Exposed for direct testing with curl/Postman
    environment:
      APP_ENV: development
      PORT: "8001"
      DATABASE_URL: "postgres://postgres:password123@auth-db:5432/auth_db?sslmode=disable"
      RABBITMQ_URL: "amqp://admin:password123@rabbitmq:5672/"
      JWT_SECRET: "local-dev-jwt-secret-minimum-32-characters!!"
      JWT_REFRESH_SECRET: "local-dev-refresh-secret-minimum-32-chars!"
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "7"
    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-net

  # ────────────────────────────────
  # Reverse Proxy
  # ────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
    networks:
      - healthcare-net

# ────────────────────────────────
# Named Volumes (data persists between container restarts)
# ────────────────────────────────
volumes:
  auth-db-data:
  rabbitmq-data:

# ────────────────────────────────
# Internal network
# Services talk to each other using container names as hostnames
# e.g. auth-service connects to "auth-db:5432"
# ────────────────────────────────
networks:
  healthcare-net:
    driver: bridge
