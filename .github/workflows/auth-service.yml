name: Auth Service CI/CD

# Triggers: only when auth-service files change
on:
  push:
    branches: [main, develop]
    paths:
      - 'auth-service/**'
      - '.github/workflows/auth-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'

env:
  SERVICE_NAME: auth-service
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/auth-service

jobs:

  # Job 1: Run Tests
  # Runs on every push and PR
 
  test:
    name: Test
    runs-on: ubuntu-latest

    # Spin up a real PostgreSQL for integration tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: auth_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.21
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache-dependency-path: auth-service/go.sum

      - name: Download dependencies
        working-directory: ./auth-service
        run: go mod download

      - name: Run linter
        uses: golangci/golangci-lint-action@v3
        with:
          working-directory: ./auth-service
          version: latest

      - name: Run tests
        working-directory: ./auth-service
        env:
          DATABASE_URL: "postgres://postgres:testpassword@localhost:5432/auth_db_test?sslmode=disable"
          JWT_SECRET: "test-jwt-secret-32-characters-ok!!"
          JWT_REFRESH_SECRET: "test-refresh-secret-32-characters!!"
          RABBITMQ_URL: ""   # Skip RabbitMQ in tests (mock it)
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./auth-service/coverage.out
          flags: auth-service


  # Job 2: Build & Push Docker Image
  # Only runs on push to main (not PRs)

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                            # Only run if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          dockerfile: ./auth-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to Kubernetes
  # Only runs on push to main, after successful build

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        # The KUBECONFIG secret contains your cluster's kubeconfig file content
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tag in deployment
        run: |
          kubectl set image deployment/auth-service \
            auth-service=${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n healthcare

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/auth-service -n healthcare --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n healthcare -l app=auth-service
