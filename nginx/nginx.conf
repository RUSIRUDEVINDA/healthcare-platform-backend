# Nginx Reverse Proxy Configuration
# Acts as the single entry point for ALL services
# 
# Traffic Flow:
#   Browser → Nginx :80 → correct service
#
# Local:  http://localhost/api/auth/register
# K8s:    http://cluster-ip/api/auth/register


events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format with request timing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # Rate Limiting Zones
    # Prevents abuse / DDoS
  
    # Per IP: 30 requests per minute for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;
    # Per IP: 100 requests per minute for general API
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=100r/m;

  
    # Upstream Service Definitions
    # Add each service here as you build them
  
    upstream auth_service {
        server auth-service:8001;
        keepalive 32;
    }

    upstream patient_service {
        server patient-service:8002;
        keepalive 32;
    }
    # upstream doctor_service {
    #     server doctor-service:8003;
    # doctor-service and ai-symptom-service use variable proxy_pass + resolver (see server block)
    # so nginx can start before those containers are healthy.

    # Uncomment as each service is built:
    # upstream patient_service {
    #     server patient-service:8003;
    #     keepalive 32;
    # }
    # upstream appointment_service {
    #     server appointment-service:8004;
    #     keepalive 32;
    # }
    # upstream payment_service {
    #     server payment-service:8005;
    #     keepalive 32;
    # }
    # upstream notification_service {
    #     server notification-service:8006;
    #     keepalive 32;
    # }
    # upstream admin_service {
    #     server admin-service:8007;
    #     keepalive 32;
    # }
    # upstream frontend {
    #     server frontend:3000;
    #     keepalive 32;
    # }

    server {
        listen 80;
        server_name localhost;

        # Docker embedded DNS — resolve upstream hostnames at request time so nginx starts
        # even when doctor-service / ai-symptom-service are still restarting.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Max request body size (for file uploads — adjust for file-storage-service)
        client_max_body_size 50M;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN"  always;
        add_header X-Content-Type-Options   "nosniff"     always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # Auth Service Routes
        # Rate limited more strictly (login, register)
    
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass         http://auth_service/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # Internal validate endpoint — only accessible from other services
        # Block external access to /auth/validate
        location /api/auth/validate {
            # Only allow internal network (Docker/K8s internal IPs)
            allow 172.16.0.0/12;  # Docker default network range
            allow 10.0.0.0/8;     # K8s pod network range
            deny  all;

            proxy_pass http://auth_service/auth/validate;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Uncomment as services are built:

  
        # Patient Service Routes
        location /api/patients/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://patient_service/api/v1/patient/;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection      "";
        }

     
        # Doctor Service — paths /doctor/ and /api/doctors/ → doctor-service /doctors/

        location = /doctor {
            return 301 /doctor/;
        }

        location /doctor/ {
            limit_req zone=api_limit burst=20 nodelay;
            # set must run before "rewrite ... break" (break stops later rewrite-phase directives).
            set $doctor_upstream doctor-service:8003;
            rewrite ^/doctor/(.*)$ /doctors/$1 break;
            proxy_pass         http://$doctor_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        location /api/doctors/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $doctor_upstream doctor-service:8003;
            rewrite ^/api/doctors/(.*)$ /doctors/$1 break;
            proxy_pass         http://$doctor_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # AI Symptom Checker — /api/ai/symptom/check → ai-symptom-service /symptoms/check
        location /api/ai/symptom/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $ai_symptom_upstream ai-symptom-service:8008;
            rewrite ^/api/ai/symptom/(.*)$ /symptoms/$1 break;
            proxy_pass         http://$ai_symptom_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

       
        # Appointment Service Routes
     
        # location /api/appointments/ {
        #     limit_req zone=api_limit burst=20 nodelay;
        #     proxy_pass         http://appointment_service/appointments/;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Host            $host;
        #     proxy_set_header   X-Real-IP       $remote_addr;
        #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header   Connection      "";
        # }

  
        # Health Check Aggregation
     
        location /health/auth {
            proxy_pass http://auth_service/health;
        }

        location /health/doctor {
            set $doctor_upstream doctor-service:8003;
            rewrite ^ /health break;
            proxy_pass http://$doctor_upstream;
        }

        location /health/ai-symptom {
            set $ai_symptom_upstream ai-symptom-service:8008;
            rewrite ^ /health break;
            proxy_pass http://$ai_symptom_upstream;
        }

        location /health {
            return 200 '{"status":"nginx-ok"}';
            add_header Content-Type application/json;
        }

    
        # React Frontend (uncomment when ready)
     
        # location / {
        #     proxy_pass         http://frontend/;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Upgrade    $http_upgrade;
        #     proxy_set_header   Connection "upgrade";
        #     proxy_set_header   Host       $host;
        # }

        # Temporary: show 404 for unmatched routes
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
