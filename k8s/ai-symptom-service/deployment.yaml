apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  namespace: healthcare
  labels:
    app: ai-symptom-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-symptom-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ai-symptom-service
        version: v1
    spec:
      containers:
        - name: ai-symptom-service
          image: DOCKERHUB_USERNAME/ai-symptom-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8008
              name: http
          envFrom:
            - configMapRef:
                name: ai-symptom-service-config
            - secretRef:
                name: ai-symptom-service-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8008
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ai-symptom-service
                topologyKey: "kubernetes.io/hostname"
