apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-service
  namespace: healthcare
  labels:
    app: doctor-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doctor-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: doctor-service
        version: v1
    spec:
      containers:
        - name: doctor-service
          image: DOCKERHUB_USERNAME/doctor-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
              name: http
          envFrom:
            - configMapRef:
                name: doctor-service-config
            - secretRef:
                name: doctor-service-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - doctor-service
                topologyKey: "kubernetes.io/hostname"
