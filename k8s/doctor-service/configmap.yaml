apiVersion: v1
kind: ConfigMap
metadata:
  name: doctor-service-config
  namespace: healthcare
data:
  APP_ENV: "production"
  PORT: "8003"
  AUTH_SERVICE_URL: "http://auth-service.healthcare.svc.cluster.local:8001"
  # Point to your K8s Service for the doctor Postgres instance (database-per-service).
  DATABASE_URL: "postgres://postgres:$(POSTGRES_PASSWORD)@doctor-db-service.healthcare.svc.cluster.local:5432/doctor_db?sslmode=disable"
  RABBITMQ_URL: "amqp://admin:$(RABBITMQ_PASSWORD)@rabbitmq-service.healthcare.svc.cluster.local:5672/"
