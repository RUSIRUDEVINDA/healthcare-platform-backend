apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: healthcare
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service      # Routes traffic to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 8001            # Port other services use: http://auth-service:8001
      targetPort: 8001      # Port the container listens on
  type: ClusterIP           # Internal only — not exposed outside the cluster
                            # Only accessible via Nginx Ingress
