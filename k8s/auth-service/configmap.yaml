apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: healthcare
data:
  APP_ENV: "production"
  PORT: "8001"
  ACCESS_TOKEN_TTL_MINUTES: "15"
  REFRESH_TOKEN_TTL_DAYS: "7"
  # These point to K8s internal service names
  # K8s DNS: service-name.namespace.svc.cluster.local
  DATABASE_URL: "postgres://postgres:$(POSTGRES_PASSWORD)@postgres-service.healthcare.svc.cluster.local:5432/auth_db?sslmode=disable"
  RABBITMQ_URL: "amqp://admin:$(RABBITMQ_PASSWORD)@rabbitmq-service.healthcare.svc.cluster.local:5672/"
